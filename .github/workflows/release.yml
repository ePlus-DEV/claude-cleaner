name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run smoke test
        run: npm run test:smoke

      - name: Test Windows helper script
        if: runner.os == 'Windows'
        shell: cmd
        run: run.cmd --version

      - name: Test macOS/Linux helper script
        if: runner.os != 'Windows'
        run: bash ./run.sh --version

  release:
    name: Publish npm and create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm with trusted publishing support
        run: |
          npm install --global npm@11
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "v$PACKAGE_VERSION"

      - name: Build package archive
        run: |
          mkdir -p dist
          npm pack --pack-destination dist

      - name: Publish package to npm
        env:
          # Optional bootstrap credential. npm uses OIDC first when Trusted
          # Publishing is configured. Add this secret only for the first
          # publication, then remove it after enabling Trusted Publishing.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.tgz --generate-notes --verify-tag
